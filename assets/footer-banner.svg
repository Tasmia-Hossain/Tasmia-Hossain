<svg width="100%" height="140" viewBox="0 0 1200 140" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Circuit board style footer banner</title>
<desc>Dark professional footer banner matching the header, with a circuit board trace pattern and animated pulses of light flowing along the traces</desc>
<defs>
<linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#111C33"/>
<stop offset="100%" stop-color="#0B1220"/>
</linearGradient>
</defs>
<rect x="0" y="0" width="1200" height="140" fill="url(#fbg)"/>
<g stroke="#2C4A73" stroke-width="1.5" fill="none" opacity="0.55">
<path d="M0 40 H160 L190 70 H420"/>
<path d="M0 100 H140 L110 70 H420"/>
<path d="M1200 40 H1040 L1010 70 H780"/>
<path d="M1200 100 H1060 L1090 70 H780"/>
</g>
<g fill="#3B82F6" opacity="0.7">
<circle cx="160" cy="40" r="3"/><circle cx="190" cy="70" r="3"/><circle cx="140" cy="100" r="3"/><circle cx="110" cy="70" r="3"/>
<circle cx="1040" cy="40" r="3"/><circle cx="1010" cy="70" r="3"/><circle cx="1060" cy="100" r="3"/><circle cx="1090" cy="70" r="3"/>
</g>
<circle r="4" fill="#67E8F9">
<animateMotion dur="3.2s" repeatCount="indefinite" path="M0 40 H160 L190 70 H420 L110 70 L140 100 H0"/>
</circle>
<circle r="4" fill="#93C5FD">
<animateMotion dur="3.6s" begin="1s" repeatCount="indefinite" path="M1200 40 H1040 L1010 70 H780 L1090 70 L1060 100 H1200"/>
</circle>
<line x1="440" y1="70" x2="760" y2="70" stroke="#2563EB" stroke-width="1" opacity="0.5"/>
<circle cx="440" cy="70" r="3" fill="#2563EB">
<animate attributeName="cx" values="440;760;440" dur="3s" repeatCount="indefinite"/>
</circle>
</svg>
